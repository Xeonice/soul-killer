name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-26
            targets: darwin-arm64,darwin-x64
          - os: ubuntu-latest
            targets: linux-x64,linux-arm64,windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            echo "  fix: run 'bun scripts/release.ts <version>' before tagging"
            exit 1
          fi
          echo "✓ tag $GITHUB_REF_NAME == package.json $PKG_VERSION"

      - name: Run tests
        run: bun run test

      - name: Build release binaries
        env:
          SOULKILLER_TARGETS: ${{ matrix.targets }}
        run: bun scripts/build.ts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/

      - name: Merge artifacts into dist/
        run: |
          mkdir -p dist
          # Copy binaries and archives (non-checksums)
          for f in dist-all/dist-macos-26/*; do
            [ "$(basename "$f")" != "checksums.txt" ] && cp "$f" dist/
          done
          for f in dist-all/dist-ubuntu-latest/*; do
            [ "$(basename "$f")" != "checksums.txt" ] && cp "$f" dist/
          done
          # Merge checksums.txt from all runners (skip comment headers from subsequent files)
          cat dist-all/dist-macos-26/checksums.txt > dist/checksums.txt
          tail -n +2 dist-all/dist-ubuntu-latest/checksums.txt >> dist/checksums.txt
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1

      - name: Create GitHub Release (overwrite if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.ref_name }}"
          # Upload each binary to versioned path + latest path
          for asset in dist/soulkiller-*.tar.gz dist/soulkiller-*.zip; do
            name=$(basename "$asset")
            npx wrangler r2 object put --remote "soulkiller-releases/releases/$VERSION/$name" --file "$asset"
            npx wrangler r2 object put --remote "soulkiller-releases/releases/latest/$name" --file "$asset"
          done
          # version.txt for Worker to read without GitHub API
          echo "$VERSION" > /tmp/version.txt
          npx wrangler r2 object put --remote "soulkiller-releases/releases/latest/version.txt" --file /tmp/version.txt
          # Checksums
          npx wrangler r2 object put --remote "soulkiller-releases/releases/$VERSION/checksums.txt" --file dist/checksums.txt
          npx wrangler r2 object put --remote "soulkiller-releases/releases/latest/checksums.txt" --file dist/checksums.txt
          # Install scripts
          npx wrangler r2 object put --remote "soulkiller-releases/scripts/install.sh" --file dist/install.sh
          npx wrangler r2 object put --remote "soulkiller-releases/scripts/install.ps1" --file dist/install.ps1

      - name: Upload examples to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in examples/*.soul.pack examples/*.world.pack; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            npx wrangler r2 object put --remote "soulkiller-releases/examples/$name" --file "$f"
          done
          for f in examples/skills/*.skill; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            npx wrangler r2 object put --remote "soulkiller-releases/examples/skills/$name" --file "$f"
          done

      - name: Deploy download Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/download
        run: npx wrangler deploy
