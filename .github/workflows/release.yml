name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-26
            targets: darwin-arm64,darwin-x64
          - os: ubuntu-latest
            targets: linux-x64,linux-arm64,windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build release binaries
        env:
          SOULKILLER_TARGETS: ${{ matrix.targets }}
        run: bun scripts/build.ts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/

      - name: Merge artifacts into dist/
        run: |
          mkdir -p dist
          cp dist-all/dist-macos-26/* dist/
          cp dist-all/dist-ubuntu-latest/* dist/
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.ref_name }}"
          # Upload each binary to versioned path + latest path
          for asset in dist/soulkiller-*.tar.gz dist/soulkiller-*.zip; do
            name=$(basename "$asset")
            npx wrangler r2 object put --remote "soulkiller-releases/releases/$VERSION/$name" --file "$asset"
            npx wrangler r2 object put --remote "soulkiller-releases/releases/latest/$name" --file "$asset"
          done
          # version.txt for Worker to read without GitHub API
          echo "$VERSION" > /tmp/version.txt
          npx wrangler r2 object put --remote "soulkiller-releases/releases/latest/version.txt" --file /tmp/version.txt
          # Install scripts
          npx wrangler r2 object put --remote "soulkiller-releases/scripts/install.sh" --file dist/install.sh
          npx wrangler r2 object put --remote "soulkiller-releases/scripts/install.ps1" --file dist/install.ps1
