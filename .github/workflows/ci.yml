name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-component:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-and-component
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run E2E tests
        run: bun run test:e2e

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-component
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run integration tests (local engine)
        run: bun run test:integration

  verify-examples:
    name: Verify example skills are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Check example skills against current engine + deprecated paths
        run: bun scripts/upgrade-example-skills.ts --check

  verify-skill-archive-purity:
    name: Verify skill archive is pure data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Scan packaged archive for any forbidden runtime code
        run: bun scripts/ci/verify-skill-archive-purity.ts

  compiled-binary-smoke:
    name: Compiled binary launches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build linux-x64 binary
        env:
          SOULKILLER_TARGETS: linux-x64
        run: bun scripts/build.ts
      - name: Extract binary from archive
        run: tar -xzf dist/soulkiller-linux-x64.tar.gz -C dist/
      - name: Binary version
        run: ./dist/soulkiller --version
      - name: Binary runtime help
        run: ./dist/soulkiller runtime --help
