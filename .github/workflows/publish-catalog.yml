name: Publish Skill Catalog

on:
  push:
    branches: [main]
    paths:
      - 'examples/skills/**'
      - 'scripts/build-catalog.ts'
      - 'workers/download/src/**'
      - '.github/workflows/publish-catalog.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build catalog.json
        run: |
          bun scripts/build-catalog.ts \
            --examples-dir examples/skills \
            --out dist/catalog.json \
            --url-prefix /examples/skills/

      # Upload every .skill in examples/skills/ plus the catalog itself.
      # Running wrangler via bunx keeps this matrix-free; adding new skills
      # to examples/skills/ doesn't require editing this workflow.
      - name: Upload skills + catalog to R2
        run: |
          set -euo pipefail
          for f in examples/skills/*.skill; do
            name="$(basename "$f")"
            echo "↑ examples/skills/$name"
            bunx wrangler r2 object put \
              "soulkiller-releases/examples/skills/$name" \
              --file "$f" --remote
          done
          echo "↑ examples/catalog.json"
          bunx wrangler r2 object put \
            soulkiller-releases/examples/catalog.json \
            --file dist/catalog.json --remote \
            --content-type application/json

      - name: Deploy Worker
        working-directory: workers/download
        run: bunx wrangler deploy

      - name: Verify catalog endpoint
        run: |
          set -euo pipefail
          sleep 5
          curl -fsS https://soulkiller-download.ad546971975.workers.dev/examples/catalog.json \
            | head -c 200
          echo
